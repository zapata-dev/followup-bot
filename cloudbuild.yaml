steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/followup-bot:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/followup-bot:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/followup-bot'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'followup-bot'
      - '--image=gcr.io/$PROJECT_ID/followup-bot:$COMMIT_SHA'
      - '--region=northamerica-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--add-cloudsql-instances=$PROJECT_ID:northamerica-south1:tono-bot-db'
      - '--set-secrets=EVOLUTION_API_URL=followup_EVOLUTION_API_URL:latest'
      - '--set-secrets=EVOLUTION_API_KEY=followup_EVOLUTION_API_KEY:latest'
      - '--set-secrets=OPENAI_API_KEY=followup_OPENAI_API_KEY:latest'
      - '--set-secrets=GEMINI_API_KEY=followup_GEMINI_API_KEY:latest'
      - '--set-secrets=MONDAY_API_KEY=followup_MONDAY_API_KEY:latest'
      - '--set-secrets=MONDAY_BOARD_ID=followup_MONDAY_BOARD_ID:latest'
      - '--set-secrets=MONDAY_STATUS_COLUMN_ID=followup_MONDAY_STATUS_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_PHONE_COLUMN_ID=followup_MONDAY_PHONE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_DEDUPE_COLUMN_ID=followup_MONDAY_DEDUPE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_VEHICLE_COLUMN_ID=followup_MONDAY_VEHICLE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_TEMPLATE_COLUMN_ID=followup_MONDAY_TEMPLATE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_SEND_DATE_COLUMN_ID=followup_MONDAY_SEND_DATE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_REPLY_DATE_COLUMN_ID=followup_MONDAY_REPLY_DATE_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_LAST_CONTACT_COLUMN_ID=followup_MONDAY_LAST_CONTACT_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_NOTES_COLUMN_ID=followup_MONDAY_NOTES_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_REPLY_COLUMN_ID=followup_MONDAY_REPLY_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_ERROR_COLUMN_ID=followup_MONDAY_ERROR_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_RESUMEN_COLUMN_ID=followup_MONDAY_RESUMEN_COLUMN_ID:latest'
      - '--set-secrets=MONDAY_LOCATION_COLUMN_ID=followup_MONDAY_LOCATION_COLUMN_ID:latest'
      - '--set-secrets=CLOUDSQL_CONNECTION_NAME=followup_CLOUDSQL_CONNECTION_NAME:latest'
      - '--set-secrets=CLOUDSQL_DB_USER=followup_CLOUDSQL_DB_USER:latest'
      - '--set-secrets=CLOUDSQL_DB_PASS=followup_CLOUDSQL_DB_PASS:latest'
      - '--set-secrets=CLOUDSQL_DB_NAME=followup_CLOUDSQL_DB_NAME:latest'

images:
  - 'gcr.io/$PROJECT_ID/followup-bot:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/followup-bot:latest'
